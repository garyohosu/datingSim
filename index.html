<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>放課後シグナル</title>
  <style>
    :root {
      --bg: #f3efe5;
      --panel: rgba(255, 252, 247, 0.92);
      --ink: #1f2a32;
      --accent: #b14f42;
      --accent-2: #356a73;
      --line: rgba(31, 42, 50, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Yu Gothic UI", "Hiragino Sans", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(177, 79, 66, 0.18), transparent 28%),
        radial-gradient(circle at top right, rgba(53, 106, 115, 0.18), transparent 24%),
        linear-gradient(180deg, #f8f4ec 0%, #efe7d8 100%);
      min-height: 100vh;
    }
    .page {
      max-width: 920px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }
    .status {
      min-height: 24px;
      margin-bottom: 12px;
      color: var(--accent);
      font-size: 14px;
    }
    .panel, .hero {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--panel);
      backdrop-filter: blur(8px);
      box-shadow: 0 18px 50px rgba(31, 42, 50, 0.08);
      padding: 24px;
    }
    .hero {
      display: grid;
      gap: 24px;
    }
    .eyebrow {
      margin: 0 0 8px;
      color: var(--accent-2);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 12px;
    }
    h1, h2, p { margin-top: 0; }
    h1 { margin-bottom: 10px; font-size: clamp(32px, 6vw, 56px); }
    .lede, .scene { line-height: 1.8; }
    .hero-actions, .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 20px;
    }
    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      background: #e2d8c6;
      color: var(--ink);
      cursor: pointer;
      font: inherit;
    }
    button.primary {
      background: var(--accent);
      color: #fff;
    }
    .list {
      display: grid;
      gap: 12px;
    }
    .list-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.6);
      border: 1px solid var(--line);
    }
    .list-item.locked {
      opacity: 0.65;
    }
    .game-meta {
      display: flex;
      gap: 10px;
      align-items: center;
      font-size: 14px;
      color: var(--accent-2);
      margin-bottom: 10px;
    }
    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      background: var(--accent-2);
      color: #fff;
      font-size: 12px;
    }
    label {
      display: block;
      margin: 10px 0;
    }
    .check {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .error {
      border-color: rgba(177, 79, 66, 0.35);
    }
    @media (max-width: 640px) {
      .panel, .hero { padding: 18px; }
      .list-item { align-items: flex-start; flex-direction: column; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="page">
    <div id="status" class="status"></div>
    <div id="app"></div>
  </main>
  <script type="module" src="./assets/js/main.js"></script>
</body>
</html>
